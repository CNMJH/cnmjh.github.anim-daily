<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 动画每日一刷</title>
    <link rel="stylesheet" href="style.css?v=202603101730">
    <style>
        body {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        .admin-header h1 {
            color: #1e293b;
            margin: 0;
            font-size: 1.8rem;
        }
        .back-btn {
            padding: 10px 24px;
            background: #f1f5f9;
            border: none;
            border-radius: 8px;
            color: #64748b;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #e2e8f0;
            color: #3b82f6;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 12px;
            color: #fff;
        }
        .stat-card:nth-child(2) {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
        }
        .stat-card:nth-child(3) {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .section-title {
            color: #1e293b;
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }
        .submission-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .submission-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            background: #f8fafc;
            transition: all 0.3s;
        }
        .submission-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .submission-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .submission-info {
            flex: 1;
        }
        .submission-title {
            color: #1e293b;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .submission-url {
            color: #3b82f6;
            font-size: 0.9rem;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .submission-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .meta-tag {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            color: #64748b;
        }
        .submission-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .action-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .approve-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: #fff;
        }
        .approve-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(17,153,142,0.4);
        }
        .reject-btn {
            background: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }
        .reject-btn:hover {
            background: #fee2e2;
        }
        .view-btn {
            background: #dbeafe;
            color: #3b82f6;
            border: 1px solid #93c5fd;
        }
        .view-btn:hover {
            background: #bfdbfe;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .json-output {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .copy-btn {
            margin-top: 10px;
            padding: 8px 20px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .copy-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🎛️ 管理员后台</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="back-btn" onclick="openTokenConfig()">⚙️ 配置GitHub</button>
                <button class="back-btn" onclick="goBack()">← 返回网站</button>
            </div>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <h3>待审核投稿</h3>
                <div class="number" id="pendingCount">0</div>
            </div>
            <div class="stat-card">
                <h3>今日投稿</h3>
                <div class="number" id="todayCount">0</div>
            </div>
            <div class="stat-card">
                <h3>总投稿数</h3>
                <div class="number" id="totalSubCount">0</div>
            </div>
        </div>

        <h2 class="section-title">📋 待审核投稿</h2>
        <div class="submission-list" id="submissionList">
            <!-- 投稿列表将通过JS动态加载 -->
        </div>
    </div>

    <!-- GitHub Token 配置弹窗 -->
    <div id="tokenModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 配置GitHub</h2>
                <button class="modal-close" onclick="closeTokenModal()">×</button>
            </div>
            <form id="tokenForm" onsubmit="saveTokenConfig(event)">
                <div class="form-group">
                    <label>GitHub Personal Access Token *</label>
                    <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx" required>
                    <small class="form-hint">需要有 repo 权限，Token 只会保存在您的本地浏览器</small>
                </div>
                <div class="form-group">
                    <label>仓库所有者 *</label>
                    <input type="text" id="repoOwner" placeholder="例如：CNMJH" required>
                </div>
                <div class="form-group">
                    <label>仓库名称 *</label>
                    <input type="text" id="repoName" placeholder="例如：cnmjh.github.anim-daily" required>
                </div>
                <div class="form-group">
                    <label>分支 *</label>
                    <input type="text" id="repoBranch" value="main" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeTokenModal()">取消</button>
                    <button type="submit" class="btn-primary">保存配置</button>
                </div>
            </form>
        </div>
    </div>
</div>

    <script>
        let pendingSubmissions = [];
        let githubConfig = {
            token: '',
            owner: '',
            repo: '',
            branch: 'main'
        };

        function loadGithubConfig() {
            try {
                const saved = localStorage.getItem('animDailyGithubConfig');
                if (saved) {
                    githubConfig = JSON.parse(saved);
                }
            } catch (e) {
                console.error('❌ 加载GitHub配置失败:', e);
            }
        }

        function saveGithubConfig() {
            try {
                localStorage.setItem('animDailyGithubConfig', JSON.stringify(githubConfig));
            } catch (e) {
                console.error('❌ 保存GitHub配置失败:', e);
            }
        }

        function openTokenConfig() {
            document.getElementById('tokenModal').style.display = 'flex';
            document.getElementById('githubToken').value = githubConfig.token || '';
            document.getElementById('repoOwner').value = githubConfig.owner || '';
            document.getElementById('repoName').value = githubConfig.repo || '';
            document.getElementById('repoBranch').value = githubConfig.branch || 'main';
        }

        function closeTokenModal() {
            document.getElementById('tokenModal').style.display = 'none';
        }

        function saveTokenConfig(event) {
            event.preventDefault();
            githubConfig.token = document.getElementById('githubToken').value;
            githubConfig.owner = document.getElementById('repoOwner').value;
            githubConfig.repo = document.getElementById('repoName').value;
            githubConfig.branch = document.getElementById('repoBranch').value;
            saveGithubConfig();
            alert('✅ GitHub配置已保存！');
            closeTokenModal();
        }

        async function getFileSha() {
            const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/works-data.json?ref=${githubConfig.branch}`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${githubConfig.token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            if (!response.ok) {
                throw new Error('获取文件信息失败');
            }
            
            const data = await response.json();
            return data.sha;
        }

        async function getCurrentWorksData() {
            const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/works-data.json?ref=${githubConfig.branch}`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${githubConfig.token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            if (!response.ok) {
                throw new Error('获取当前内容失败');
            }
            
            const data = await response.json();
            const content = atob(data.content);
            return JSON.parse(content);
        }

        async function updateGithubWorksData(newWork) {
            if (!githubConfig.token || !githubConfig.owner || !githubConfig.repo) {
                alert('❌ 请先配置GitHub！点击右上角"⚙️ 配置GitHub"');
                return false;
            }

            try {
                const sha = await getFileSha();
                let currentData = await getCurrentWorksData();
                
                if (!Array.isArray(currentData)) {
                    currentData = [];
                }
                
                currentData.push(newWork);
                
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
                
                const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/works-data.json`;
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: '通过用户投稿: ' + newWork.title,
                        content: content,
                        sha: sha,
                        branch: githubConfig.branch
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '更新失败');
                }

                return true;
            } catch (e) {
                console.error('❌ GitHub更新失败:', e);
                alert('❌ 更新GitHub失败: ' + e.message + '\n\n请检查Token和配置是否正确！');
                return false;
            }
        }

        function loadPendingSubmissions() {
            try {
                const saved = localStorage.getItem('animDailyPendingSubmissions');
                if (saved) {
                    pendingSubmissions = JSON.parse(saved);
                }
            } catch (e) {
                console.error('❌ 加载待审核投稿失败:', e);
            }
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const todaySubmissions = pendingSubmissions.filter(s => 
                s.submittedAt && s.submittedAt.startsWith(today)
            );
            
            document.getElementById('pendingCount').textContent = pendingSubmissions.length;
            document.getElementById('todayCount').textContent = todaySubmissions.length;
            document.getElementById('totalSubCount').textContent = pendingSubmissions.length;
        }

        function renderSubmissions() {
            const container = document.getElementById('submissionList');
            
            if (pendingSubmissions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🎉</div>
                        <h3>暂无待审核投稿</h3>
                        <p>所有投稿都已审核完毕！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = pendingSubmissions.map(submission => `
                <div class="submission-card" id="submission-${submission.id}">
                    <div class="submission-header">
                        <div class="submission-info">
                            <div class="submission-title">${escapeHtml(submission.title)}</div>
                            <div class="submission-url">
                                <a href="${escapeHtml(submission.url)}" target="_blank" style="color: #3b82f6;">
                                    ${escapeHtml(submission.url)}
                                </a>
                            </div>
                            <div class="submission-meta">
                                <span class="meta-tag">${submission.type === 'animation' ? '🎬 动画作品' : '🧍 Pose参考'}</span>
                                <span class="meta-tag">📁 ${getSubcategoryName(submission.subcategory)}</span>
                                <span class="meta-tag">🌐 ${escapeHtml(submission.source)}</span>
                                <span class="meta-tag">🕐 ${formatDate(submission.submittedAt)}</span>
                            </div>
                            ${submission.description ? `<div style="margin-top: 10px; color: #64748b;">${escapeHtml(submission.description)}</div>` : ''}
                            ${submission.tags && submission.tags.length > 0 ? `
                                <div style="margin-top: 10px;">
                                    ${submission.tags.map(tag => `<span class="meta-tag">🏷️ ${escapeHtml(tag)}</span>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    <div class="submission-actions">
                        <button class="action-btn view-btn" onclick="viewLink('${escapeHtml(submission.url)}')">🔗 打开链接</button>
                        <button class="action-btn approve-btn" onclick="approveSubmission('${submission.id}')">✅ 通过</button>
                        <button class="action-btn reject-btn" onclick="rejectSubmission('${submission.id}')">❌ 拒绝</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getSubcategoryName(subcategory) {
            const names = {
                'character': '角色动画',
                'action': '动作场面',
                'facial': '表情动画',
                'creature': '生物动画',
                'stand': '站立姿势',
                'action_pose': '动态姿势',
                'hand': '手部参考'
            };
            return names[subcategory] || subcategory;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '未知';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
        }

        function viewLink(url) {
            window.open(url, '_blank');
        }

        async function approveSubmission(id) {
            const submission = pendingSubmissions.find(s => s.id === id);
            if (!submission) return;

            const jsonData = {
                id: 'work_' + Date.now(),
                title: submission.title,
                type: submission.type,
                subcategory: submission.subcategory,
                url: submission.url,
                source: submission.source,
                artist: submission.artist,
                date: submission.date,
                image: submission.image || '',
                description: submission.description,
                tags: submission.tags,
                likes: 0
            };

            if (!confirm('✅ 确定要通过这条投稿吗？\n\n将自动添加到GitHub并从待审核列表删除！')) {
                return;
            }

            const success = await updateGithubWorksData(jsonData);
            
            if (success) {
                pendingSubmissions = pendingSubmissions.filter(s => s.id !== id);
                savePendingSubmissions();
                renderSubmissions();
                updateStats();
                alert('✅ 投稿已通过！已自动添加到GitHub！');
            }
        }

        function rejectSubmission(id) {
            if (confirm('❌ 确定要拒绝这条投稿吗？此操作不可撤销！')) {
                pendingSubmissions = pendingSubmissions.filter(s => s.id !== id);
                savePendingSubmissions();
                renderSubmissions();
                updateStats();
            }
        }



        function savePendingSubmissions() {
            try {
                localStorage.setItem('animDailyPendingSubmissions', JSON.stringify(pendingSubmissions));
            } catch (e) {
                console.error('❌ 保存待审核投稿失败:', e);
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function init() {
            loadGithubConfig();
            loadPendingSubmissions();
            updateStats();
            renderSubmissions();
        }

        init();
    </script>
</body>
</html>
