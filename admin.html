<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 动画每日一刷</title>
    <link rel="stylesheet" href="style.css?v=202603110230">
    <style>
        body { padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .admin-container { max-width: 1400px; margin: 0 auto; background: #fff; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #e2e8f0; }
        .admin-header h1 { color: #1e293b; margin: 0; font-size: 1.8rem; }
        .back-btn { padding: 10px 24px; background: #f1f5f9; border: none; border-radius: 8px; color: #64748b; cursor: pointer; font-size: 0.95rem; transition: all 0.3s; }
        .back-btn:hover { background: #e2e8f0; color: #3b82f6; }
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; flex-wrap: wrap; }
        .nav-tab { padding: 12px 24px; background: #f8fafc; border: none; border-bottom: 2px solid transparent; color: #64748b; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: all 0.3s; border-radius: 8px 8px 0 0; }
        .nav-tab:hover { background: #e2e8f0; color: #3b82f6; }
        .nav-tab.active { background: #fff; border-bottom-color: #3b82f6; color: #3b82f6; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section-title { color: #1e293b; font-size: 1.3rem; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .save-btn { padding: 12px 36px; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); border: none; border-radius: 8px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(17,153,142,0.4); }
        .list-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0; }
        .item-info { flex: 1; }
        .item-actions { display: flex; gap: 10px; }
        .item-btn { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        .edit-btn { background: #dbeafe; color: #3b82f6; }
        .edit-btn:hover { background: #bfdbfe; }
        .delete-btn { background: #fee2e2; color: #ef4444; }
        .delete-btn:hover { background: #fecaca; }
        .add-btn { padding: 10px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 8px; color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 12px; color: #fff; }
        .stat-card:nth-child(2) { background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%); }
        .stat-card:nth-child(3) { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .stat-card:nth-child(4) { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 0.85rem; opacity: 0.9; }
        .stat-card .number { font-size: 2rem; font-weight: 700; }
        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
        .empty-state .icon { font-size: 4rem; margin-bottom: 20px; }
        .work-item-title { font-weight: 600; color: #1e293b; margin-bottom: 5px; }
        .work-item-url { color: #3b82f6; font-size: 0.85rem; word-break: break-all; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #fff; border-radius: 15px; padding: 30px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h2 { color: #1e293b; margin: 0; font-size: 1.3rem; }
        .modal-close { background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; color: #64748b; transition: all 0.3s; }
        .modal-close:hover { background: #e2e8f0; color: #3b82f6; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-secondary { padding: 10px 24px; background: #f1f5f9; border: none; border-radius: 8px; color: #64748b; cursor: pointer; font-size: 0.95rem; transition: all 0.3s; }
        .btn-secondary:hover { background: #e2e8f0; color: #3b82f6; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🎛️ 管理员后台（开发版）</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="back-btn" onclick="goBack()">← 返回网站</button>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="works" onclick="switchTab('works')">🎬 内容管理</button>
            <button class="nav-tab" data-tab="site" onclick="switchTab('site')">🏷️ 网站设置</button>
            <button class="nav-tab" data-tab="stats" onclick="switchTab('stats')">📊 数据统计</button>
        </div>

        <div id="works" class="tab-content active">
            <h2 class="section-title">🎬 内容管理</h2>
            <div style="margin-bottom: 20px;"><button class="add-btn" onclick="openWorkModal()">+ 新增内容</button></div>
            <div class="list-container" id="worksList"></div>
        </div>

        <div id="site" class="tab-content">
            <h2 class="section-title">🏷️ 网站设置</h2>
            <div class="form-grid">
                <div class="form-group"><label>网站标题</label><input type="text" id="siteTitle" placeholder="动画每日一刷"></div>
                <div class="form-group"><label>网站副标题</label><input type="text" id="siteSubtitle" placeholder="3D 动画师每日灵感与 Pose 参考"></div>
                <div class="form-group"><label>网站Logo（emoji）</label><input type="text" id="siteLogo" placeholder="🎬"></div>
                <div class="form-group"><label>每页显示数量</label><input type="number" id="itemsPerPage" placeholder="9" min="1" max="50"></div>
                <div class="form-group"><label>每行显示数量</label><input type="number" id="itemsPerRow" placeholder="3" min="1" max="6"></div>
            </div>
            <button class="save-btn" onclick="saveSiteConfig()">💾 保存设置</button>
        </div>

        <div id="stats" class="tab-content">
            <h2 class="section-title">📊 数据统计</h2>
            <div class="stats-grid">
                <div class="stat-card"><h3>总内容数</h3><div class="number" id="statTotalWorks">0</div></div>
                <div class="stat-card"><h3>动画作品</h3><div class="number" id="statAnimations">0</div></div>
                <div class="stat-card"><h3>Pose参考</h3><div class="number" id="statPoses">0</div></div>
                <div class="stat-card"><h3>总点赞数</h3><div class="number" id="statTotalLikes">0</div></div>
            </div>
        </div>
    </div>

    <div id="workModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="workModalTitle">编辑内容</h2>
                <button class="modal-close" onclick="closeWorkModal()">×</button>
            </div>
            <form id="workForm" onsubmit="handleWorkSubmit(event)">
                <input type="hidden" id="workId">
                <div class="form-group"><label>内容链接 *</label><input type="url" id="workUrl" placeholder="请输入B站/花瓣链接" required></div>
                <div class="form-group"><label>内容标题 *</label><input type="text" id="workTitle" placeholder="内容标题" required></div>
                <div class="form-group"><label>内容分类 *</label>
                    <select id="workType" onchange="updateSubcategories()" required>
                        <option value="animation">动画作品</option>
                        <option value="pose">Pose 参考</option>
                    </select>
                </div>
                <div class="form-group"><label>子分类 *</label>
                    <select id="workSubcategory" required>
                        <option value="">请先选择内容分类</option>
                    </select>
                </div>
                <div class="form-group"><label>简短描述</label><textarea id="workDescription" placeholder="简单介绍这个内容" rows="2"></textarea></div>
                <div class="form-group"><label>标签（空格分隔）</label><input type="text" id="workTags" placeholder="例如：Maya 角色动画"></div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeWorkModal()">取消</button>
                    <button type="submit" class="save-btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let worksData = [];
        let siteConfig = {};
        let editingWorkId = null;

        // 子分类映射
        const subcategories = {
            animation: [
                { id: 'character', name: '角色动画' },
                { id: 'action', name: '动作场面' },
                { id: 'facial', name: '表情动画' },
                { id: 'creature', name: '生物动画' }
            ],
            pose: [
                { id: 'stand', name: '站立姿势' },
                { id: 'action_pose', name: '动态姿势' },
                { id: 'hand', name: '手部参考' }
            ]
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadWorks();
            loadSiteConfig();
        });

        // 切换标签
        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelector(`.nav-tab[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(tabName).classList.add('active');
            
            if (tabName === 'works') {
                loadWorks();
            } else if (tabName === 'stats') {
                loadStats();
            } else if (tabName === 'site') {
                loadSiteConfig();
            }
        }

        // 返回网站
        function goBack() {
            window.location.href = 'index.html';
        }

        // 加载works-data.json
        async function loadWorks() {
            try {
                const response = await fetch('works-data.json');
                worksData = await response.json();
                renderWorks();
            } catch (e) {
                console.error('加载内容失败:', e);
                worksData = [];
                renderWorks();
            }
        }

        // 渲染内容列表
        function renderWorks() {
            const container = document.getElementById('worksList');
            
            if (!worksData || worksData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🎬</div>
                        <h3>暂无内容</h3>
                        <p>点击"新增内容"添加第一个作品！</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = worksData.map((work, index) => `
                <div class="list-item">
                    <div class="item-info">
                        <div class="work-item-title">${work.title || '无标题'}</div>
                        <div class="work-item-url">${work.url || '无链接'}</div>
                    </div>
                    <div class="item-actions">
                        <button class="item-btn edit-btn" onclick="editWork(${index})">编辑</button>
                        <button class="item-btn delete-btn" onclick="deleteWork(${index})">删除</button>
                    </div>
