<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 动画每日一刷</title>
    <link rel="stylesheet" href="style.css?v=202603101800">
    <script src="supabase.js"></script>
    <style>
        body {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        .admin-header h1 {
            color: #1e293b;
            margin: 0;
            font-size: 1.8rem;
        }
        .back-btn {
            padding: 10px 24px;
            background: #f1f5f9;
            border: none;
            border-radius: 8px;
            color: #64748b;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #e2e8f0;
            color: #3b82f6;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 12px;
            color: #fff;
        }
        .stat-card:nth-child(2) {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
        }
        .stat-card:nth-child(3) {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .section-title {
            color: #1e293b;
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }
        .submission-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .submission-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            background: #f8fafc;
            transition: all 0.3s;
        }
        .submission-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .submission-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .submission-info {
            flex: 1;
        }
        .submission-title {
            color: #1e293b;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .submission-url {
            color: #3b82f6;
            font-size: 0.9rem;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .submission-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .meta-tag {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            color: #64748b;
        }
        .submission-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .action-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .approve-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: #fff;
        }
        .approve-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(17,153,142,0.4);
        }
        .reject-btn {
            background: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }
        .reject-btn:hover {
            background: #fee2e2;
        }
        .view-btn {
            background: #dbeafe;
            color: #3b82f6;
            border: 1px solid #93c5fd;
        }
        .view-btn:hover {
            background: #bfdbfe;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .json-output {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .copy-btn {
            margin-top: 10px;
            padding: 8px 20px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .copy-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🎛️ 管理员后台</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="back-btn" onclick="openTokenConfig()">⚙️ 配置GitHub</button>
                <button class="back-btn" onclick="refreshSubmissions()">🔄 刷新投稿</button>
                <button class="back-btn" onclick="goBack()">← 返回网站</button>
            </div>
        </div>

        <div class="nav-tabs" style="display: flex; gap: 5px; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; flex-wrap: wrap;">
            <button class="nav-tab active" style="padding: 12px 24px; background: #fff; border: none; border-bottom: 2px solid #3b82f6; color: #3b82f6; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: all 0.3s; border-radius: 8px 8px 0 0;" onclick="switchAdminTab('submissions')">📋 投稿审核</button>
            <button class="nav-tab" style="padding: 12px 24px; background: #f8fafc; border: none; border-bottom: 2px solid transparent; color: #64748b; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: all 0.3s; border-radius: 8px 8px 0 0;" onclick="switchAdminTab('reports')">⚠️ 举报管理</button>
        </div>

        <div id="submissions-section">
            <div class="stats-cards">
                <div class="stat-card">
                    <h3>待审核投稿</h3>
                    <div class="number" id="pendingCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>今日投稿</h3>
                    <div class="number" id="todayCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>总投稿数</h3>
                    <div class="number" id="totalSubCount">0</div>
                </div>
            </div>
            <h2 class="section-title">📋 待审核投稿</h2>
            <div class="submission-list" id="submissionList">
                <!-- 投稿列表将通过JS动态加载 -->
            </div>
        </div>

        <div id="reports-section" style="display:none;">
            <div class="stats-cards" style="margin-bottom: 20px;">
                <div class="stat-card">
                    <h3>待处理举报</h3>
                    <div class="number" id="reportCount">0</div>
                </div>
                <div class="stat-card" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                    <h3>已处理举报</h3>
                    <div class="number" id="resolvedReportCount">0</div>
                </div>
            </div>
            <h2 class="section-title">⚠️ 举报管理</h2>
            <div class="submission-list" id="reportsList">
                <!-- 举报列表将通过JS动态加载 -->
            </div>
        </div>
    </div>

    <!-- GitHub Token 配置弹窗 -->
    <div id="tokenModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>⚙️ 配置GitHub</h2>
                <button class="modal-close" onclick="closeTokenModal()">×</button>
            </div>
            <form id="tokenForm" onsubmit="saveTokenConfig(event)">
                <div class="form-group">
                    <label>GitHub Personal Access Token *</label>
                    <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx" required>
                    <small class="form-hint">需要有 repo 权限，Token 只会保存在您的本地浏览器</small>
                </div>
                <div class="form-group">
                    <label>仓库所有者 *</label>
                    <input type="text" id="repoOwner" placeholder="例如：CNMJH" required>
                </div>
                <div class="form-group">
                    <label>仓库名称 *</label>
                    <input type="text" id="repoName" placeholder="例如：cnmjh.github.anim-daily" required>
                </div>
                <div class="form-group">
                    <label>分支 *</label>
                    <input type="text" id="repoBranch" value="main" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeTokenModal()">取消</button>
                    <button type="submit" class="btn-primary">保存配置</button>
                </div>
            </form>
        </div>
    </div>
</div>

    <script>
        let pendingSubmissions = [];
        let reports = [];
        let githubConfig = {
            token: '',
            owner: '',
            repo: '',
            branch: 'main'
        };

        // 切换管理标签
        function switchAdminTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'submissions') {
                document.getElementById('submissions-section').style.display = 'block';
                document.getElementById('reports-section').style.display = 'none';
            } else if (tab === 'reports') {
                document.getElementById('submissions-section').style.display = 'none';
                document.getElementById('reports-section').style.display = 'block';
                loadReports();
            }
        }

        // 从Supabase加载举报
        async function loadReports() {
            try {
                // 加载待处理举报
                const pendingUrl = `${SUPABASE_URL}/rest/v1/reports?status=eq.pending&order=created_at.desc`;
                const pendingResponse = await fetch(pendingUrl, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Accept': 'application/json'
                    }
                });

                // 加载已处理举报
                const resolvedUrl = `${SUPABASE_URL}/rest/v1/reports?status=eq.resolved&order=created_at.desc`;
                const resolvedResponse = await fetch(resolvedUrl, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Accept': 'application/json'
                    }
                });

                if (!pendingResponse.ok || !resolvedResponse.ok) {
                    throw new Error('获取举报失败');
                }

                const pendingReports = await pendingResponse.json();
                const resolvedReports = await resolvedResponse.json();
                
                reports = [...pendingReports, ...resolvedReports];
                renderReports();
                
                // 更新统计
                document.getElementById('reportCount').textContent = pendingReports.length;
                document.getElementById('resolvedReportCount').textContent = resolvedReports.length;
            } catch (e) {
                console.error('❌ 加载举报失败:', e);
                document.getElementById('reportsList').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">❌</div>
                        <h3>加载举报失败</h3>
                        <p>请稍后再试！</p>
                    </div>
                `;
                document.getElementById('reportCount').textContent = '0';
                document.getElementById('resolvedReportCount').textContent = '0';
            }
        }

        // 渲染举报列表
        function renderReports() {
            const container = document.getElementById('reportsList');

            if (!reports || reports.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">✅</div>
                        <h3>暂无举报</h3>
                        <p>所有举报都已处理完毕！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = reports.map(report => {
                const isPending = report.status === 'pending';
                const safeUrl = report.work_url ? report.work_url.replace(/'/g, "\\'") : '';
                
                return `
                    <div class="submission-card" style="opacity: ${isPending ? 1 : 0.6};">
                        <div class="submission-header">
                            <div class="submission-info">
                                <div class="submission-title">${escapeHtml(report.work_title || '无标题')}</div>
                                <div class="submission-url" style="cursor: pointer; color: #3b82f6;" onclick="window.open('${safeUrl}', '_blank')">${escapeHtml(report.work_url || '无链接')}</div>
                                <div class="submission-meta">
                                    <span class="meta-tag">🆔 ${escapeHtml(report.work_id || '未知')}</span>
                                    <span class="meta-tag">🕐 ${formatDate(report.created_at)}</span>
                                    ${!isPending ? '<span class="meta-tag" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff;">✅ 已处理</span>' : ''}
                                </div>
                            </div>
                        </div>
                        ${isPending ? `
                        <div class="submission-actions">
                            <button class="action-btn view-btn" onclick="window.open('${safeUrl}', '_blank')">🔗 打开链接</button>
                            <button class="action-btn approve-btn" onclick="resolveReport('${report.id}')">✅ 已处理</button>
                            <button class="action-btn" style="background: #fef2f2; color: #ef4444; border: 1px solid #fecaca;" onclick="ignoreReport('${report.id}')">😐 忽略</button>
                            <button class="action-btn delete-btn" onclick="deleteReport('${report.id}')">🗑️ 删除</button>
                        </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // 标记举报为已处理
        async function resolveReport(reportId) {
            if (!confirm('✅ 确定要标记这个举报为已处理吗？')) {
                return;
            }

            try {
                const url = `${SUPABASE_URL}/rest/v1/reports?id=eq.${reportId}`;
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        status: 'resolved'
                    })
                });

                if (response.ok) {
                    alert('✅ 举报已标记为已处理！');
                    loadReports();
                } else {
                    alert('❌ 处理失败！');
                }
            } catch (e) {
                console.error('处理举报失败:', e);
                alert('❌ 处理失败！');
            }
        }

        // 忽略举报
        async function ignoreReport(reportId) {
            if (!confirm('😐 确定要忽略这个举报吗？')) {
                return;
            }

            try {
                const url = `${SUPABASE_URL}/rest/v1/reports?id=eq.${reportId}`;
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({
                        status: 'ignored'
                    })
                });

                if (response.ok) {
                    alert('😐 已忽略这个举报！');
                    loadReports();
                } else {
                    alert('❌ 操作失败！');
                }
            } catch (e) {
                console.error('忽略举报失败:', e);
                alert('❌ 操作失败！');
            }
        }

        // 删除举报
        async function deleteReport(reportId) {
            if (!confirm('🗑️ 确定要删除这个举报吗？此操作不可撤销！')) {
                return;
            }

            try {
                const url = `${SUPABASE_URL}/rest/v1/reports?id=eq.${reportId}`;
                const response = await fetch(url, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Prefer': 'return=minimal'
                    }
                });

                if (response.ok) {
                    alert('🗑️ 举报已删除！');
                    loadReports();
                } else {
                    alert('❌ 删除失败！');
                }
            } catch (e) {
                console.error('删除举报失败:', e);
                alert('❌ 删除失败！');
            }
        }

        function loadGithubConfig() {
            try {
                const saved = localStorage.getItem('animDailyGithubConfig');
                if (saved) {
                    githubConfig = JSON.parse(saved);
                }
            } catch (e) {
                console.error('❌ 加载GitHub配置失败:', e);
            }
        }

        function saveGithubConfig() {
            try {
                localStorage.setItem('animDailyGithubConfig', JSON.stringify(githubConfig));
            } catch (e) {
                console.error('❌ 保存GitHub配置失败:', e);
            }
        }

        function openTokenConfig() {
            document.getElementById('tokenModal').style.display = 'flex';
            document.getElementById('githubToken').value = githubConfig.token || '';
            document.getElementById('repoOwner').value = githubConfig.owner || '';
            document.getElementById('repoName').value = githubConfig.repo || '';
            document.getElementById('repoBranch').value = githubConfig.branch || 'main';
        }

        function closeTokenModal() {
            document.getElementById('tokenModal').style.display = 'none';
        }

        function saveTokenConfig(event) {
            event.preventDefault();
            githubConfig.token = document.getElementById('githubToken').value;
            githubConfig.owner = document.getElementById('repoOwner').value;
            githubConfig.repo = document.getElementById('repoName').value;
            githubConfig.branch = document.getElementById('repoBranch').value;
            saveGithubConfig();
            alert('✅ GitHub配置已保存！');
            closeTokenModal();
        }

        async function getFileSha() {
            const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/works-data.json?ref=${githubConfig.branch}`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${githubConfig.token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            if (!response.ok) {
                throw new Error('获取文件信息失败');
            }
            
            const data = await response.json();
            return data.sha;
        }

        async function getCurrentWorksData() {
            const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/works-data.json?ref=${githubConfig.branch}`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${githubConfig.token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            
            if (!response.ok) {
                throw new Error('获取当前内容失败');
            }
            
            const data = await response.json();
            const content = atob(data.content);
            return JSON.parse(content);
        }

        async function getIssuesFromGithub() {
            if (!githubConfig.token || !githubConfig.owner || !githubConfig.repo) {
                return [];
            }

            try {
                const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/issues?state=open&labels=待审核`;
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) {
                    throw new Error('获取Issues失败');
                }

                const issues = await response.json();
                return issues.map(issue => parseIssueToSubmission(issue));
            } catch (e) {
                console.error('❌ 从GitHub获取Issues失败:', e);
                return [];
            }
        }

        function parseIssueToSubmission(issue) {
            const body = issue.body || '';
            
            // 从Issue body中提取信息
            const urlMatch = body.match(/\*\*内容链接：\*\*\s*(.+?)\n/);
            const typeMatch = body.match(/\*\*内容分类：\*\*\s*(.+?)\n/);
            const subcategoryMatch = body.match(/\*\*子分类：\*\*\s*(.+?)\n/);
            const titleMatch = body.match(/\*\*内容标题：\*\*\s*(.+?)\n/);
            const descriptionMatch = body.match(/\*\*简短描述：\*\*\s*(.+?)\n/);
            const tagsMatch = body.match(/\*\*标签：\*\*\s*(.+?)\n/);
            const sourceMatch = body.match(/\*\*来源：\*\*\s*(.+?)\n/);

            const typeStr = typeMatch ? typeMatch[1].trim() : '';
            const type = typeStr.includes('动画') ? 'animation' : 'pose';

            const subcategoryStr = subcategoryMatch ? subcategoryMatch[1].trim() : '';
            const subcategoryMap = {
                '角色动画': 'character',
                '动作场面': 'action',
                '表情动画': 'facial',
                '生物动画': 'creature',
                '站立姿势': 'stand',
                '动态姿势': 'action_pose',
                '手部参考': 'hand'
            };
            const subcategory = subcategoryMap[subcategoryStr] || 'character';

            const tagsStr = tagsMatch ? tagsMatch[1].trim() : '';
            const tags = tagsStr && tagsStr !== '（无）' ? tagsStr.split(/[,，]\s*/).filter(t => t.trim()) : [];

            return {
                id: 'issue_' + issue.number,
                issueNumber: issue.number,
                url: urlMatch ? urlMatch[1].trim() : '',
                type: type,
                subcategory: subcategory,
                title: titleMatch && titleMatch[1].trim() !== '（未填写）' ? titleMatch[1].trim() : issue.title,
                description: descriptionMatch && descriptionMatch[1].trim() !== '（未填写）' ? descriptionMatch[1].trim() : '',
                tags: tags,
                source: sourceMatch ? sourceMatch[1].trim() : '未知',
                artist: '待确认',
                date: new Date().toISOString().split('T')[0],
                image: '',
                likes: 0,
                submittedAt: issue.created_at,
                status: 'pending',
                fromIssue: true
            };
        }

        async function closeIssue(issueNumber) {
            if (!githubConfig.token || !githubConfig.owner || !githubConfig.repo) {
                return false;
            }

            try {
                const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/issues/${issueNumber}`;
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        state: 'closed',
                        labels: ['已处理']
                    })
                });

                return response.ok;
            } catch (e) {
                console.error('❌ 关闭Issue失败:', e);
                return false;
            }
        }

        async function updateGithubWorksData(newWork) {
            if (!githubConfig.token || !githubConfig.owner || !githubConfig.repo) {
                alert('❌ 请先配置GitHub！点击右上角"⚙️ 配置GitHub"');
                return false;
            }

            try {
                const sha = await getFileSha();
                let currentData = await getCurrentWorksData();
                
                if (!Array.isArray(currentData)) {
                    currentData = [];
                }
                
                currentData.push(newWork);
                
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2))));
                
                const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/works-data.json`;
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubConfig.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: '通过用户投稿: ' + newWork.title,
                        content: content,
                        sha: sha,
                        branch: githubConfig.branch
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || '更新失败');
                }

                return true;
            } catch (e) {
                console.error('❌ GitHub更新失败:', e);
                alert('❌ 更新GitHub失败: ' + e.message + '\n\n请检查Token和配置是否正确！');
                return false;
            }
        }

        async function loadPendingSubmissions() {
            // 先从Supabase加载
            let supabaseSubmissions = [];
            try {
                supabaseSubmissions = await getPendingSubmissionsFromSupabase();
            } catch (e) {
                console.error('❌ 从Supabase加载投稿失败:', e);
            }
            
            // 再从GitHub Issues加载（兼容旧数据）
            let issues = [];
            try {
                issues = await getIssuesFromGithub();
            } catch (e) {
                console.error('❌ 从GitHub加载投稿失败:', e);
            }
            
            // 再从localStorage加载本地的投稿（兼容旧数据）
            let localSubmissions = [];
            try {
                const saved = localStorage.getItem('animDailyPendingSubmissions');
                if (saved) {
                    localSubmissions = JSON.parse(saved);
                }
            } catch (e) {
                console.error('❌ 加载本地待审核投稿失败:', e);
            }
            
            // 合并
            pendingSubmissions = [...supabaseSubmissions, ...issues, ...localSubmissions];
        }

        async function refreshSubmissions() {
            await loadPendingSubmissions();
            updateStats();
            renderSubmissions();
            alert('✅ 投稿列表已刷新！');
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const todaySubmissions = pendingSubmissions.filter(s => 
                s.submittedAt && s.submittedAt.startsWith(today)
            );
            
            document.getElementById('pendingCount').textContent = pendingSubmissions.length;
            document.getElementById('todayCount').textContent = todaySubmissions.length;
            document.getElementById('totalSubCount').textContent = pendingSubmissions.length;
        }

        function renderSubmissions() {
            const container = document.getElementById('submissionList');
            
            if (pendingSubmissions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🎉</div>
                        <h3>暂无待审核投稿</h3>
                        <p>所有投稿都已审核完毕！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = pendingSubmissions.map(submission => `
                <div class="submission-card" id="submission-${submission.id}">
                    <div class="submission-header">
                        <div class="submission-info">
                            <div class="submission-title">${escapeHtml(submission.title)}</div>
                            <div class="submission-url">
                                <a href="${escapeHtml(submission.url)}" target="_blank" style="color: #3b82f6;">
                                    ${escapeHtml(submission.url)}
                                </a>
                            </div>
                            <div class="submission-meta">
                                <span class="meta-tag">${submission.type === 'animation' ? '🎬 动画作品' : '🧍 Pose参考'}</span>
                                <span class="meta-tag">📁 ${getSubcategoryName(submission.subcategory)}</span>
                                <span class="meta-tag">🌐 ${escapeHtml(submission.source)}</span>
                                <span class="meta-tag">🕐 ${formatDate(submission.submittedAt)}</span>
                                ${submission.fromSupabase ? '<span class="meta-tag" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: #fff;">☁️ 来自Supabase</span>' : submission.fromIssue ? '<span class="meta-tag" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff;">📌 来自GitHub Issue</span>' : '<span class="meta-tag">💾 本地保存</span>'}
                            </div>
                            ${submission.description ? `<div style="margin-top: 10px; color: #64748b;">${escapeHtml(submission.description)}</div>` : ''}
                            ${submission.tags && submission.tags.length > 0 ? `
                                <div style="margin-top: 10px;">
                                    ${submission.tags.map(tag => `<span class="meta-tag">🏷️ ${escapeHtml(tag)}</span>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    <div class="submission-actions">
                        <button class="action-btn view-btn" onclick="viewLink('${escapeHtml(submission.url)}')">🔗 打开链接</button>
                        <button class="action-btn approve-btn" onclick="approveSubmission('${submission.id}')">✅ 通过</button>
                        <button class="action-btn reject-btn" onclick="rejectSubmission('${submission.id}')">❌ 拒绝</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getSubcategoryName(subcategory) {
            const names = {
                'character': '角色动画',
                'action': '动作场面',
                'facial': '表情动画',
                'creature': '生物动画',
                'stand': '站立姿势',
                'action_pose': '动态姿势',
                'hand': '手部参考'
            };
            return names[subcategory] || subcategory;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '未知';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
        }

        function viewLink(url) {
            window.open(url, '_blank');
        }

        async function approveSubmission(id) {
            const submission = pendingSubmissions.find(s => s.id === id);
            if (!submission) return;

            // 如果标题是"待审核内容"或者空的，让用户确认或修改
            let finalTitle = submission.title;
            if (!finalTitle || finalTitle === '待审核内容') {
                const userTitle = prompt('📝 这个投稿没有填写标题，请输入一个合适的标题：', submission.url);
                if (userTitle && userTitle.trim()) {
                    finalTitle = userTitle.trim();
                } else {
                    finalTitle = submission.url; // 实在不行就用URL当标题
                }
            }

            const jsonData = {
                id: 'work_' + Date.now(),
                title: finalTitle,
                type: submission.type,
                subcategory: submission.subcategory,
                url: submission.url,
                source: submission.source,
                artist: submission.artist,
                date: submission.date,
                image: submission.image || '',
                description: submission.description,
                tags: submission.tags,
                likes: 0
            };

            if (!confirm('✅ 确定要通过这条投稿吗？\n\n将自动添加到GitHub并从待审核列表删除！')) {
                return;
            }

            const success = await updateGithubWorksData(jsonData);
            
            if (success) {
                // 如果是来自Supabase的投稿，更新状态
                if (submission.fromSupabase && submission.supabaseId) {
                    await updateSubmissionStatus(submission.supabaseId, 'approved');
                }
                // 如果是来自Issue的投稿，关闭Issue
                else if (submission.fromIssue && submission.issueNumber) {
                    await closeIssue(submission.issueNumber);
                }
                
                pendingSubmissions = pendingSubmissions.filter(s => s.id !== id);
                savePendingSubmissions();
                renderSubmissions();
                updateStats();
                alert('✅ 投稿已通过！已自动添加到GitHub！');
            }
        }

        async function rejectSubmission(id) {
            const submission = pendingSubmissions.find(s => s.id === id);
            if (!submission) return;

            if (confirm('❌ 确定要拒绝这条投稿吗？此操作不可撤销！')) {
                // 如果是来自Supabase的投稿，更新状态
                if (submission.fromSupabase && submission.supabaseId) {
                    await updateSubmissionStatus(submission.supabaseId, 'rejected');
                }
                // 如果是来自Issue的投稿，关闭Issue
                else if (submission.fromIssue && submission.issueNumber) {
                    await closeIssue(submission.issueNumber);
                }
                
                pendingSubmissions = pendingSubmissions.filter(s => s.id !== id);
                savePendingSubmissions();
                renderSubmissions();
                updateStats();
            }
        }



        function savePendingSubmissions() {
            try {
                localStorage.setItem('animDailyPendingSubmissions', JSON.stringify(pendingSubmissions));
            } catch (e) {
                console.error('❌ 保存待审核投稿失败:', e);
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        async function init() {
            loadGithubConfig();
            await loadPendingSubmissions();
            updateStats();
            renderSubmissions();
        }

        init();
    </script>
</body>
</html>
