<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 动画每日一刷</title>
    <link rel="stylesheet" href="style.css?v=202603091400">
    <style>
        body {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }
        .admin-header h1 {
            color: #1e293b;
            margin: 0;
            font-size: 1.8rem;
        }
        .back-btn {
            padding: 10px 24px;
            background: #f1f5f9;
            border: none;
            border-radius: 8px;
            color: #64748b;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #e2e8f0;
            color: #3b82f6;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 12px;
            color: #fff;
        }
        .stat-card:nth-child(2) {
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
        }
        .stat-card:nth-child(3) {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
        }
        .section-title {
            color: #1e293b;
            font-size: 1.3rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }
        .submission-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .submission-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            background: #f8fafc;
            transition: all 0.3s;
        }
        .submission-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .submission-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .submission-info {
            flex: 1;
        }
        .submission-title {
            color: #1e293b;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .submission-url {
            color: #3b82f6;
            font-size: 0.9rem;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .submission-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .meta-tag {
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            color: #64748b;
        }
        .submission-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .action-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .approve-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: #fff;
        }
        .approve-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(17,153,142,0.4);
        }
        .reject-btn {
            background: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }
        .reject-btn:hover {
            background: #fee2e2;
        }
        .view-btn {
            background: #dbeafe;
            color: #3b82f6;
            border: 1px solid #93c5fd;
        }
        .view-btn:hover {
            background: #bfdbfe;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .json-output {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .copy-btn {
            margin-top: 10px;
            padding: 8px 20px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .copy-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>🎛️ 管理员后台</h1>
            <button class="back-btn" onclick="goBack()">← 返回网站</button>
        </div>

        <div class="stats-cards">
            <div class="stat-card">
                <h3>待审核投稿</h3>
                <div class="number" id="pendingCount">0</div>
            </div>
            <div class="stat-card">
                <h3>今日投稿</h3>
                <div class="number" id="todayCount">0</div>
            </div>
            <div class="stat-card">
                <h3>总投稿数</h3>
                <div class="number" id="totalSubCount">0</div>
            </div>
        </div>

        <h2 class="section-title">📋 待审核投稿</h2>
        <div class="submission-list" id="submissionList">
            <!-- 投稿列表将通过JS动态加载 -->
        </div>
    </div>

    <script>
        let pendingSubmissions = [];

        function loadPendingSubmissions() {
            try {
                const saved = localStorage.getItem('animDailyPendingSubmissions');
                if (saved) {
                    pendingSubmissions = JSON.parse(saved);
                }
            } catch (e) {
                console.error('❌ 加载待审核投稿失败:', e);
            }
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const todaySubmissions = pendingSubmissions.filter(s => 
                s.submittedAt && s.submittedAt.startsWith(today)
            );
            
            document.getElementById('pendingCount').textContent = pendingSubmissions.length;
            document.getElementById('todayCount').textContent = todaySubmissions.length;
            document.getElementById('totalSubCount').textContent = pendingSubmissions.length;
        }

        function renderSubmissions() {
            const container = document.getElementById('submissionList');
            
            if (pendingSubmissions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🎉</div>
                        <h3>暂无待审核投稿</h3>
                        <p>所有投稿都已审核完毕！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = pendingSubmissions.map(submission => `
                <div class="submission-card" id="submission-${submission.id}">
                    <div class="submission-header">
                        <div class="submission-info">
                            <div class="submission-title">${escapeHtml(submission.title)}</div>
                            <div class="submission-url">
                                <a href="${escapeHtml(submission.url)}" target="_blank" style="color: #3b82f6;">
                                    ${escapeHtml(submission.url)}
                                </a>
                            </div>
                            <div class="submission-meta">
                                <span class="meta-tag">${submission.type === 'animation' ? '🎬 动画作品' : '🧍 Pose参考'}</span>
                                <span class="meta-tag">📁 ${getSubcategoryName(submission.subcategory)}</span>
                                <span class="meta-tag">🌐 ${escapeHtml(submission.source)}</span>
                                <span class="meta-tag">🕐 ${formatDate(submission.submittedAt)}</span>
                            </div>
                            ${submission.description ? `<div style="margin-top: 10px; color: #64748b;">${escapeHtml(submission.description)}</div>` : ''}
                            ${submission.tags && submission.tags.length > 0 ? `
                                <div style="margin-top: 10px;">
                                    ${submission.tags.map(tag => `<span class="meta-tag">🏷️ ${escapeHtml(tag)}</span>`).join('')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                    <div class="submission-actions">
                        <button class="action-btn view-btn" onclick="viewLink('${escapeHtml(submission.url)}')">🔗 打开链接</button>
                        <button class="action-btn approve-btn" onclick="approveSubmission('${submission.id}')">✅ 通过</button>
                        <button class="action-btn reject-btn" onclick="rejectSubmission('${submission.id}')">❌ 拒绝</button>
                    </div>
                    <div id="json-${submission.id}" style="display:none;">
                        <div class="json-output" id="json-output-${submission.id}"></div>
                        <button class="copy-btn" onclick="copyJson('${submission.id}')">📋 复制JSON</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getSubcategoryName(subcategory) {
            const names = {
                'character': '角色动画',
                'action': '动作场面',
                'facial': '表情动画',
                'creature': '生物动画',
                'stand': '站立姿势',
                'action_pose': '动态姿势',
                'hand': '手部参考'
            };
            return names[subcategory] || subcategory;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '未知';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
        }

        function viewLink(url) {
            window.open(url, '_blank');
        }

        function approveSubmission(id) {
            const submission = pendingSubmissions.find(s => s.id === id);
            if (!submission) return;

            const jsonData = {
                id: 'work_' + Date.now(),
                title: submission.title,
                type: submission.type,
                subcategory: submission.subcategory,
                url: submission.url,
                source: submission.source,
                artist: submission.artist,
                date: submission.date,
                image: submission.image || '',
                description: submission.description,
                tags: submission.tags,
                likes: 0
            };

            const jsonOutput = document.getElementById('json-output-' + id);
            const jsonContainer = document.getElementById('json-' + id);
            
            jsonOutput.textContent = JSON.stringify(jsonData, null, 2);
            jsonContainer.style.display = 'block';

            if (confirm('✅ 已生成JSON！\n\n请复制上面的JSON，然后手动添加到 works-data.json 文件中。\n\n是否同时从待审核列表中删除这条投稿？')) {
                pendingSubmissions = pendingSubmissions.filter(s => s.id !== id);
                savePendingSubmissions();
                renderSubmissions();
                updateStats();
            }
        }

        function rejectSubmission(id) {
            if (confirm('❌ 确定要拒绝这条投稿吗？此操作不可撤销！')) {
                pendingSubmissions = pendingSubmissions.filter(s => s.id !== id);
                savePendingSubmissions();
                renderSubmissions();
                updateStats();
            }
        }

        function copyJson(id) {
            const jsonOutput = document.getElementById('json-output-' + id);
            const text = jsonOutput.textContent;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('📋 JSON已复制到剪贴板！');
            }).catch(err => {
                console.error('复制失败:', err);
                alert('❌ 复制失败，请手动复制！');
            });
        }

        function savePendingSubmissions() {
            try {
                localStorage.setItem('animDailyPendingSubmissions', JSON.stringify(pendingSubmissions));
            } catch (e) {
                console.error('❌ 保存待审核投稿失败:', e);
            }
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function init() {
            loadPendingSubmissions();
            updateStats();
            renderSubmissions();
        }

        init();
    </script>
</body>
</html>
